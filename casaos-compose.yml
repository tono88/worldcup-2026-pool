name: worldcup-2026-pool

services:
  web:
    image: ghcr.io/tono88/worldcup-2026-pool-local:latest
    container_name: worldcup-2026-pool
    pull_policy: always
    restart: unless-stopped
    ports:
      - "8090:3000"
    volumes:
      - worldcup-2026-pool-data:/data
    environment:
      FIFA_UPDATE_INTERVAL_SECONDS: "60"
      NODE_TLS_REJECT_UNAUTHORIZED: "0"

volumes:
  worldcup-2026-pool-data:

x-casaos:
  architectures:
    - amd64
    - arm64
  main: web
  category: Web
  developer: tono88
  author: tono88
  tagline:
    en_us: FIFA World Cup 2026 prediction pool
  title:
    en_us: World Cup 2026 Pool
  description:
    en_us: Self-hosted FIFA World Cup 2026 prediction pool with local SQLite storage.
  port_map: "8090"
  index: /

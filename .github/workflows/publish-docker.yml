name: Publish Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/tono88/worldcup-2026-pool-web:latest
            ghcr.io/tono88/worldcup-2026-pool-web:${{ github.sha }}
          build-args: |
            VITE_FIREBASE_API_KEY=AIzaSyA7YXoLlHHJvzGRZtkqbwRgeP273h-PUDM
            VITE_FIREBASE_AUTH_DOMAIN=worldcup-2026.firebaseapp.com
            VITE_FIREBASE_DATABASE_URL=https://worldcup-2026-default-rtdb.firebaseio.com
            VITE_FIREBASE_PROJECT_ID=worldcup-2026
            VITE_FIREBASE_STORAGE_BUCKET=worldcup-2026.firebasestorage.app
            VITE_FIREBASE_MESSAGING_SENDER_ID=990743282094
            VITE_FIREBASE_APP_ID=1:990743282094:web:21e8061810cb0f625a483f
            VITE_FIREBASE_MEASUREMENT_ID=G-TDZEB0YJR0

      - name: Build and push score worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: |
            ghcr.io/tono88/worldcup-2026-pool-worker:latest
            ghcr.io/tono88/worldcup-2026-pool-worker:${{ github.sha }}

name: worldcup-2026-pool

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.local
    image: worldcup-2026-pool-local
    container_name: worldcup-2026-pool
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:3000"
    volumes:
      - worldcup-2026-pool-data:/data
    environment:
      FIFA_UPDATE_INTERVAL_SECONDS: ${FIFA_UPDATE_INTERVAL_SECONDS:-60}
      NODE_TLS_REJECT_UNAUTHORIZED: ${NODE_TLS_REJECT_UNAUTHORIZED:-0}

volumes:
  worldcup-2026-pool-data:
